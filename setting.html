<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>設定 - TaskTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .back-btn:hover { background: #f0f0f0; }
        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        .content {
            padding: 24px 20px;
            max-width: 480px;
            margin: 0 auto;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .section h2 {
            margin: 0 0 16px;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        .setting-row label {
            font-size: 15px;
            color: #333;
        }
        .setting-row input[type="time"] {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .setting-row input[type="time"]:focus { border-color: #555; }
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>
<div class="header">
    <button class="back-btn" onclick="location.href='index.html'">‹</button>
    <h1>設定</h1>
</div>

<div class="content">
    <div class="section">
        <h2>時刻</h2>
        <div class="setting-row">
            <label>開始時刻</label>
            <input type="time" id="startTimeInput">
        </div>
    </div>

    <!-- 将来の設定項目をここに追加 -->

    <div class="section">
        <button class="logout-btn" id="logoutBtn">ログアウト</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'check' })
            });
            const data = await res.json();
            if (!data.ok) { location.href = 'login.html'; return; }
        } catch (e) {
            location.href = 'login.html'; return;
        }

        const startTimeInput = document.getElementById('startTimeInput');
        startTimeInput.value = localStorage.getItem('startTime') || '09:00';

        startTimeInput.addEventListener('change', () => {
            localStorage.setItem('startTime', startTimeInput.value);
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'logout' })
            });
            localStorage.clear();
            location.href = 'login.html';
        });
    });
</script>
</body>
</html>
